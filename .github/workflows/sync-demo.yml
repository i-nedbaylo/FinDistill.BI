name: Sync demo branch to public repository

on:
  push:
    branches:
      - demo

# Prevent concurrent mirror pushes from racing when multiple commits land on demo
concurrency:
  group: sync-demo
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout demo branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: demo
          # Disable default credential persistence so it does not interfere
          # with the PUBLIC_REPO_TOKEN used to push to the mirror repository
          persist-credentials: false

      - name: Push to public mirror repository
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          git remote add public https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/i-nedbaylo/FinDistill.BI-demo.git
          # Plain --force is intentional: this is a one-way mirror workflow.
          # The concurrency group above already serializes concurrent pushes.
          # --force-with-lease would vacuously pass here because the remote is
          # freshly added and has no stored tracking ref to check against.
          git push public HEAD:main --force
